name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        # Ensure tools for linting and test coverage are installed
        pip install flake8 coverage pytest

    - name: Run linting
      run: |
        flake8 . --exit-zero

    - name: Run tests with coverage
      run: |
        coverage run -m pytest
        coverage report -m --include='backend/app/*'

    - name: Check coverage
      run: |
        coverage report --fail-under=80 --include='backend/app/*'

    - name: Build Docker image
      if: success()  # Only run this step if all previous steps succeed
      run: |
        docker compose -f docker-compose.yml build
